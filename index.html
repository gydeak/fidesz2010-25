    async function fetchDataset(ds) {
      const geoParams = COUNTRIES.map(c => `geo=${c}`).join("&");
      const dimParams = Object.entries(ds.params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join("&");
      const dsId = ds.dsOverride || ds.id;
      const url = `https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/${dsId}?format=JSON&lang=EN&${dimParams}&${geoParams}&sinceTimePeriod=${encodeURIComponent(ds.from)}&untilTimePeriod=${encodeURIComponent(ds.to)}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function fetchAndParseTsv(ds) {
      const geoList = COUNTRIES.join(",");
      const dimParams = Object.entries(ds.params).map(([k,v]) => `c[${k}]=${encodeURIComponent(v)}`).join("&");
      const dsId = ds.dsOverride || ds.id;
      const url = `https://ec.europa.eu/eurostat/api/dissemination/sdmx/3.0/data/dataflow/ESTAT/${dsId}/1.0/*?${dimParams}&c[geo]=${geoList}&c[TIME_PERIOD]=ge:${ds.from}+le:${ds.to}&compress=false&format=tsv`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      const lines = text.split("\n");
      if (lines.length < 2) throw new Error("Üres TSV");
      // Header: "freq,...,geo\TIME_PERIOD	2010	2011	..."
      const dates = lines[0].split("\t").slice(1).map(d => d.trim()).filter(Boolean);
      const result = {};
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cols = lines[i].split("\t");
        const rowKey = cols[0];
        // geo is the last comma-separated field in rowKey
        const geo = rowKey.split(",").pop().trim();
        if (!COUNTRIES.includes(geo)) continue;
        result[geo] = {};
        for (let j = 1; j < cols.length && j <= dates.length; j++) {
          // strip flags like " e", " p", " b"
          const v = parseFloat(cols[j].trim().replace(/[^\d.-]/g, ""));
          if (!isNaN(v)) result[geo][dates[j-1]] = v;
        }
      }
      return result;
    }

    function parseEurostatJSON(data) {
      const dims = data.id || [];
      const sizes = data.size || [];
      const values = data.value || {};
      const geoPos = dims.indexOf("geo");
      const timePos = dims.indexOf("time");
      if (geoPos < 0 || timePos < 0) return {};
      const geoCatIdx = data.dimension?.geo?.category?.index || {};
      const timeCatIdx = data.dimension?.time?.category?.index || {};
      const strides = new Array(dims.length).fill(1);
      for (let i = dims.length - 2; i >= 0; i--) strides[i] = strides[i + 1] * sizes[i + 1];
      const totalSize = sizes.reduce((a, b) => a * b, 1);
      const result = {};
      for (const country of COUNTRIES) {
        const geoIdx = geoCatIdx[country];
        if (geoIdx === undefined) continue;
        result[country] = {};
        for (const [timePeriod, timeIdx] of Object.entries(timeCatIdx)) {
          for (let flatIdx = 0; flatIdx < totalSize; flatIdx++) {
            const gI = Math.floor(flatIdx / strides[geoPos]) % sizes[geoPos];
            const tI = Math.floor(flatIdx / strides[timePos]) % sizes[timePos];
            if (gI === geoIdx && tI === timeIdx) {
              const v = values[flatIdx];
              if (v !== null && v !== undefined) { result[country][timePeriod] = v; break; }
            }
          }
        }
      }
      return result;
    }

    // SDMX 3.0 TSV fetch+parse (same format as gydeak.github.io uses)
    async function fetchSdmx3Tsv(ds) {
      // Fetch all countries at once — same approach as gydeak.github.io
      const result = {};
      try {
        const dimParams = Object.entries(ds.sdmxDims).map(([k,v]) => `c[${k}]=${encodeURIComponent(v)}`).join("&");
        const geoList = COUNTRIES.join(",");
        const url = `https://ec.europa.eu/eurostat/api/dissemination/sdmx/3.0/data/dataflow/ESTAT/${ds.sdmxDs}/1.0/*?${dimParams}&c[geo]=${geoList}&c[TIME_PERIOD]=ge:${ds.from}+le:${ds.to}&compress=false&format=tsv`;
        console.log("fetchSdmx3Tsv URL:", url);
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        const lines = text.split("\n");
        if (lines.length < 2) throw new Error("Üres TSV válasz");
        // TSV header: "freq,spdepb,...,geo\t2010\t2011\t..."
        const dates = lines[0].split("\t").slice(1).map(d => d.trim()).filter(d => d);
        console.log("fetchSdmx3Tsv dates:", dates.slice(0,5), "rows:", lines.length);
        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;
          const cols = lines[i].split("\t");
          const rowKey = cols[0].toUpperCase();
          // Find which country this row belongs to
          const country = COUNTRIES.find(c => {
            // rowKey format: "A,OLD,TOTAL,MIO_PPS,HU" — geo is last segment
            const parts = rowKey.split(",");
            return parts[parts.length - 1].trim() === c;
          });
          if (!country) continue;
          result[country] = {};
          for (let j = 1; j < cols.length && j <= dates.length; j++) {
            const v = parseFloat(cols[j].trim().replace(/[^\d.-]/g, ""));
            if (!isNaN(v) && dates[j-1]) result[country][dates[j-1]] = v;
          }
        }
        console.log("fetchSdmx3Tsv result countries:", Object.keys(result));
      } catch(e) {
        console.error("fetchSdmx3Tsv error:", ds.id, e);
      }
      return result;
    }

    // SDMX 3.0 JSON parser
    // Struktúra: data.data.dataSets[0].observations = { "0:0:0:...": [value, ...] }
    // data.data.structure.dimensions.observation = [{id, values:[{id},...]}]
    function parseSdmx3JSON(data) {
      try {
        const struct = data.data.structure.dimensions.observation;
        const dimMap = {};
        struct.forEach((dim, i) => { dimMap[dim.id] = i; });
        const geoPos = dimMap["geo"] ?? dimMap["GEO"];
        const timePos = dimMap["TIME_PERIOD"] ?? dimMap["time"];
        if (geoPos === undefined || timePos === undefined) return {};
        const geoValues = struct[geoPos].values;   // [{id:"BG",...},...]
        const timeValues = struct[timePos].values; // [{id:"2020",...},...]
        const obs = data.data.dataSets[0].observations;
        const result = {};
        for (const [key, valArr] of Object.entries(obs)) {
          const parts = key.split(":");
          const geoIdx = parseInt(parts[geoPos]);
          const timeIdx = parseInt(parts[timePos]);
          const geoCode = geoValues[geoIdx]?.id;
          const timePeriod = timeValues[timeIdx]?.id;
          const val = valArr[0];
          if (!COUNTRIES.includes(geoCode)) continue;
          if (val === null || val === undefined) continue;
          if (!result[geoCode]) result[geoCode] = {};
          result[geoCode][timePeriod] = val;
        }
        return result;
      } catch(e) {
        console.error("parseSdmx3JSON error:", e);
        return {};
      }
    }

    // Közös időintervallum: csak azok az időpontok, ahol MINDEN országnak van adata.
    // Képlet (ratio): (utolsó / utolsó évi átlag) − (első / első évi átlag)
    // Képlet (diff):  (utolsó − utolsó évi átlag) − (első − első évi átlag)
    function computeAllScores(parsedByCountry, method, goodDirection) {
      // Összegyűjtjük azokat az időpontokat ahol mind a 11 országnak van adata
      const allTimes = new Set();
      for (const c of COUNTRIES) {
        if (parsedByCountry[c]) Object.keys(parsedByCountry[c]).forEach(t => allTimes.add(t));
      }
      const commonTimes = Array.from(allTimes).sort().filter(t =>
        COUNTRIES.every(c => parsedByCountry[c]?.[t] != null)
      );
      if (commonTimes.length < 2) return {};
      const firstTime = commonTimes[0];
      const lastTime  = commonTimes[commonTimes.length - 1];
      const firstVals = COUNTRIES.map(c => parsedByCountry[c][firstTime]);
      const lastVals  = COUNTRIES.map(c => parsedByCountry[c][lastTime]);
      const firstAvg = firstVals.reduce((a, b) => a + b, 0) / firstVals.length;
      const lastAvg  = lastVals.reduce((a, b) => a + b, 0) / lastVals.length;
      if (firstAvg === 0 || lastAvg === 0) return {};
      const scores = {};
      for (const c of COUNTRIES) {
        const fv = parsedByCountry[c][firstTime];
        const lv = parsedByCountry[c][lastTime];
        const score = method === "ratio"
          ? (lv / lastAvg) - (fv / firstAvg)
          : (lv - lastAvg) - (fv - firstAvg);
        scores[c] = goodDirection === +1 ? score : -score;
      }
      return scores;
    }

    function rankCountries(scores) {
      const valid = Object.entries(scores).filter(([, v]) => v !== null && !isNaN(v));
      valid.sort((a, b) => b[1] - a[1]);
      const ranks = {};
      valid.forEach(([c], i) => { ranks[c] = i + 1; });
      COUNTRIES.forEach(c => { if (!(c in ranks)) ranks[c] = null; });
      return ranks;
    }

    function getRankColor(rank) {
      if (rank == null) return "#111827";
      const t = (rank - 1) / 10;
      const r = t < 0.5 ? Math.round(22 + (t * 2) * (234 - 22)) : Math.round(234 + ((t - 0.5) * 2) * (185 - 234));
      const g = t < 0.5 ? Math.round(163 - (t * 2) * (163 - 179)) : Math.round(179 - ((t - 0.5) * 2) * (179 - 28));
      const b = t < 0.5 ? Math.round(74 - (t * 2) * (74 - 7)) : 7;
      return `rgb(${r},${g},${b})`;
    }

    const GROUPS = DATASETS.filter(ds => !ds.hidden).map(ds => ({ key: ds.id, label: ds.label, ids: [ds.id] }));

    // Ezek az indikátorok indexek, ezért az abszolút helyzetnél nem értelmezhetők nyers sorrendként
    const INDEX_ONLY_IDS = new Set(["prc_hicp_minr", "prc_hpi_q"]);

    function App() {
      const [results, setResults] = useState({});
      const [rawData, setRawData] = useState({});
      const [loading, setLoading] = useState({});
      const [errors, setErrors] = useState({});
      const [selectedGroups, setSelectedGroups] = useState(() => new Set());
      const [showDetails, setShowDetails] = useState(false);
      const [sortByCol, setSortByCol] = useState('last'); // 'first' | 'last'

      const loadAll = useCallback(async () => {
        const parsedCache = {};
        for (const ds of DATASETS) {
          setLoading(prev => ({ ...prev, [ds.id]: true }));
          try {
            let parsed;
            if (ds.derived) {
              // Derived: kiadás / ellátottak száma
              const [numId, denId] = ds.derived;
              const numData = parsedCache[numId];
              const denData = parsedCache[denId];
              if (!numData || !denData) throw new Error("Forrásadat hiányzik");
              parsed = {};
              for (const c of COUNTRIES) {
                if (!numData[c] || !denData[c]) continue;
                parsed[c] = {};
                for (const t of Object.keys(numData[c])) {
                  if (denData[c][t] && denData[c][t] !== 0)
                    parsed[c][t] = (numData[c][t] * 1_000_000) / denData[c][t];
                }
              }
            } else {
              const data = await fetchDataset(ds);
              parsed = parseEurostatJSON(data);
            }
            parsedCache[ds.id] = parsed;
            const countryCount = COUNTRIES.filter(c => parsed[c] && Object.keys(parsed[c]).length > 0).length;
            if (countryCount === 0) throw new Error("Üres válasz");
            const scores = computeAllScores(parsed, ds.method, ds.goodDirection);
            setResults(prev => ({ ...prev, [ds.id]: rankCountries(scores) }));
            setRawData(prev => ({ ...prev, [ds.id]: parsed }));
          } catch (e) {
            setErrors(prev => ({ ...prev, [ds.id]: e.message }));
          } finally {
            setLoading(prev => ({ ...prev, [ds.id]: false }));
          }
        }
      }, []);

      useEffect(() => { loadAll(); }, [loadAll]);

      const loadedCount = DATASETS.filter(ds => results[ds.id] || errors[ds.id]).length;
      const allDone = loadedCount === DATASETS.length;

      // Csak a kiválasztott csoportokhoz tartozó datasetek
      const visibleIds = new Set(GROUPS.filter(g => selectedGroups.has(g.key)).flatMap(g => g.ids));
      const visibleDatasets = DATASETS.filter(ds => visibleIds.has(ds.id));

      // Abszolút helyzethez csak a nem-index datasetek (infláció és lakásár kizárva)
      const absDatasets = visibleDatasets.filter(ds => !INDEX_ONLY_IDS.has(ds.id));

      const avgRanks = {};
      for (const c of COUNTRIES) {
        const ranks = visibleDatasets.map(ds => results[ds.id]?.[c]).filter(r => r != null);
        avgRanks[c] = ranks.length > 0 ? ranks.reduce((a, b) => a + b, 0) / ranks.length : null;
      }
      const sorted = [...COUNTRIES].sort((a, b) => (avgRanks[a] ?? 999) - (avgRanks[b] ?? 999));

      // Második táblázat: első és utolsó nyers adat szerinti helyezések
      const singleDs = visibleDatasets.length === 1 ? visibleDatasets[0] : null;

      // Minden visible dataset-re: első és utolsó közös időpont
      // Egy datasetre megkeresi az első és utolsó közös időpontot (ahol minden ország adott)
      const getDsCommonTimes = (ds) => {
        const dsCountryTimes = COUNTRIES.map(c => new Set(Object.keys(rawData[ds.id]?.[c] || {})));
        if (dsCountryTimes.some(s => s.size === 0)) return { first: null, last: null };
        const intersection = dsCountryTimes.reduce((a, b) => new Set([...a].filter(x => b.has(x))));
        if (intersection.size === 0) return { first: null, last: null };
        const sorted = [...intersection].sort();
        return { first: sorted[0], last: sorted[sorted.length - 1] };
      };

      // firstTime / lastTime: fejléc megjelenítéshez
      // single dataset esetén annak saját időpontjai; több datasetnél az absDatasets alapján (infláció/lakásár kizárva)
      const { first: firstTime, last: lastTime } = (() => {
        if (visibleDatasets.length === 0) return { first: null, last: null };
        if (singleDs) return getDsCommonTimes(singleDs);
        if (absDatasets.length === 0) return { first: null, last: null };
        const perDs = absDatasets.map(ds => getDsCommonTimes(ds));
        const firsts = perDs.map(t => t.first).filter(Boolean).sort();
        const lasts  = perDs.map(t => t.last).filter(Boolean).sort();
        return { first: firsts[0] ?? null, last: lasts[lasts.length - 1] ?? null };
      })();

      // Első/utolsó időpont szerinti rangsor (minden visible dataset saját időpontján)
      const firstRanks = {};
      const lastRanks = {};
      const firstRawVals = {}; // csak single dataset esetén
      const lastRawVals = {};

      if (singleDs) {
        const { first: f, last: l } = getDsCommonTimes(singleDs);
        if (f && l) {
          for (const c of COUNTRIES) {
            firstRawVals[c] = rawData[singleDs.id]?.[c]?.[f] ?? null;
            lastRawVals[c] = rawData[singleDs.id]?.[c]?.[l] ?? null;
          }
        }
      } else {
        // Több dataset esetén csak az absDatasets alapján számítunk (infláció és lakásár kizárva)
        for (const ds of absDatasets) {
          const { first: f, last: l } = getDsCommonTimes(ds);
          if (!f || !l) continue;
          const firstScores = {};
          const lastScores = {};
          for (const c of COUNTRIES) {
            const fv = rawData[ds.id]?.[c]?.[f];
            const lv = rawData[ds.id]?.[c]?.[l];

            if (lv != null) lastScores[c] = ds.goodDirection === 1 ? lv : -lv;
          }
          const fRanked = rankCountries(firstScores);
          const lRanked = rankCountries(lastScores);
          for (const c of COUNTRIES) {
            if (fRanked[c] != null) firstRanks[c] = (firstRanks[c] || []).concat(fRanked[c]);
            if (lRanked[c] != null) lastRanks[c] = (lastRanks[c] || []).concat(lRanked[c]);
          }
        }
      }

      const firstAvgRanks = {};
      const lastAvgRanks = {};
      if (!singleDs) {
        for (const c of COUNTRIES) {
          firstAvgRanks[c] = firstRanks[c]?.length > 0 ? firstRanks[c].reduce((a,b)=>a+b,0)/firstRanks[c].length : null;
          lastAvgRanks[c] = lastRanks[c]?.length > 0 ? lastRanks[c].reduce((a,b)=>a+b,0)/lastRanks[c].length : null;
        }
      }

      // Rendezés az első vagy utolsó adat szerint
      const sortedByLast = [...COUNTRIES].sort((a, b) => {
        const isFirst = sortByCol === 'first';
        const va = singleDs
          ? ((isFirst ? firstRawVals[a] : lastRawVals[a]) ?? (singleDs.goodDirection === 1 ? -Infinity : Infinity))
          : ((isFirst ? firstAvgRanks[a] : lastAvgRanks[a]) ?? 999);
        const vb = singleDs
          ? ((isFirst ? firstRawVals[b] : lastRawVals[b]) ?? (singleDs.goodDirection === 1 ? -Infinity : Infinity))
          : ((isFirst ? firstAvgRanks[b] : lastAvgRanks[b]) ?? 999);
        return singleDs ? (singleDs.goodDirection === 1 ? vb - va : va - vb) : va - vb;
      });

      return (
        <div style={{ fontFamily: "'Segoe UI', sans-serif", background: "#0b1426", minHeight: "100vh", padding: "28px 16px", color: "#e2e8f0" }}>

          <div style={{ maxWidth: 560, margin: "0 auto", display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ textAlign: "center", marginBottom: 4 }}>
              <span style={{ color: "#94a3b8", fontSize: 12, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>
                Visszajelzés
              </span>
              <p style={{ color: "#475569", fontSize: 11, marginTop: 4 }}>
                Hibát találtál vagy fejlesztési ötleted van? Írj nekünk!
              </p>
            </div>
            <input
              placeholder="Neved (nem kötelező)"
              value={name} onChange={e => setName(e.target.value)}
              style={{ ...inputStyle, height: 38 }}
            />
            <input
              type="email"
              placeholder="E-mail címed (kötelező)"
              value={email} onChange={e => setEmail(e.target.value)}
              style={{ ...inputStyle, height: 38, borderColor: email.trim() ? (isValidEmail(email) ? "#166534" : "#991b1b") : "#4b1c1c" }}
            />
            <textarea
              placeholder="Írd le a hibát vagy fejlesztési ötletet..."
              rows={4} value={message} onChange={e => setMessage(e.target.value)}
              style={inputStyle}
            />
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <button
                onClick={send}
                disabled={status === "sending" || !message.trim() || !isValidEmail(email)}
                style={{
                  background: (status === "sending" || !message.trim() || !isValidEmail(email)) ? "#1e293b" : "#166534",
                  color: (status === "sending" || !message.trim() || !isValidEmail(email)) ? "#475569" : "#fff",
                  border: "none", borderRadius: 8, padding: "10px 24px",
                  fontSize: 13, fontWeight: 700,
                  cursor: (status === "sending" || !message.trim() || !isValidEmail(email)) ? "default" : "pointer",
                  transition: "background 0.2s", whiteSpace: "nowrap"
                }}
              >
                {status === "sending" ? "Küldés…" : "Elküldöm"}
              </button>
              {status === "ok"  && <span style={{ color: "#34d399", fontSize: 12 }}>✓ Üzenet elküldve, köszönjük!</span>}
              {status === "err" && <span style={{ color: "#f87171", fontSize: 12 }}>Hiba történt, próbáld újra.</span>}
            </div>
          </div>
        </div>
      );
    }

    function Root() {
      return (
        <>
          <App />
          <ShareButtons />
          <FeedbackFooter />
        </>
      );
    }
    
    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
